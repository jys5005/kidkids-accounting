<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자동로그인 - 키드키즈 회계</title>

  <!-- CSS 개별 파일 -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/tabs.css">
  <link rel="stylesheet" href="css/table.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/buttons.css">
  <link rel="stylesheet" href="css/modal.css">
</head>
<body>

<div class="page-wrapper">

  <!-- 언더바 탭 -->
  <div class="tab-bar">
    <a href="../data-migration/index.html" class="tab-item tab-item--inactive">데이터이관</a>
    <a href="index.html" class="tab-item tab-item--active">자동로그인</a>
  </div>

  <!-- 헤더 -->
  <div class="section-header">
    <h2 class="section-title">자동로그인</h2>
    <div class="header-right">
      <span class="header-label">회계장부업체명</span>
      <select id="companySelect" class="select-box">
        <option value="">업체 선택</option>
      </select>
      <button id="btnAdd" class="btn btn--md btn-add">추가</button>
    </div>
  </div>

  <!-- 테이블 -->
  <div class="table-container">
    <table class="data-table">
      <thead>
        <tr>
          <th class="th" style="width:40px">연번</th>
          <th class="th" style="width:200px">업체명</th>
          <th class="th" style="width:150px">시설명</th>
          <th class="th" style="width:80px">로그인방식</th>
          <th class="th" style="width:140px">아이디</th>
          <th class="th" style="width:140px">비번</th>
          <th class="th" style="width:80px">인증서등록</th>
          <th class="th" style="width:80px">저장,삭제</th>
          <th class="th" style="width:50px">검증</th>
          <th class="th" style="width:90px">최종로그인</th>
          <th class="th" style="width:50px">로그인</th>
          <th class="th" style="width:70px">월회계보고</th>
          <th class="th" style="width:70px">추경회계보고</th>
          <th class="th" style="width:70px">결산회계보고</th>
          <th class="th th--last" style="width:70px">카드매칭</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <!-- JS로 동적 렌더링 -->
      </tbody>
    </table>
  </div>

</div>

<!-- 인포텍 인증프로그램 모달 -->
<div id="modalOverlay" class="modal-overlay modal-overlay--hidden">
  <div class="modal-box" onclick="event.stopPropagation()">

    <!-- 모달 헤더 -->
    <div class="modal-header">
      <h3 class="modal-title">인포텍 인증프로그램</h3>
      <span id="modalCompanyLabel" class="modal-subtitle"></span>
    </div>

    <!-- 모달 바디 -->
    <div class="modal-body">
      <div class="cert-icon-row">
        <div class="cert-icon">&#128272;</div>
        <div>
          <p class="cert-title">공동인증서 (구 공인인증서)</p>
          <p class="cert-desc">인포텍 인증프로그램을 통해 인증서를 등록합니다</p>
        </div>
      </div>

      <!-- 인증서 저장위치 -->
      <div class="field-group">
        <label class="field-label">인증서 저장위치</label>
        <select class="select-box" style="width:100%; min-width:0;">
          <option value="hard">하드디스크</option>
          <option value="usb">이동식디스크(USB)</option>
          <option value="phone">휴대폰</option>
          <option value="cloud">클라우드</option>
        </select>
      </div>

      <!-- 인증서 목록 -->
      <div class="field-group">
        <label class="field-label">인증서 선택</label>
        <div id="certList" class="cert-list">
          <div class="cert-list-empty">등록된 인증서가 없습니다</div>
        </div>
      </div>

      <!-- 인증서 파일 가져오기 -->
      <div class="field-group">
        <label class="field-label">인증서 파일 가져오기</label>
        <input type="file" id="certFileInput" class="input-file" accept=".pfx,.p12,.der,.cer,.pem,.key">
      </div>
    </div>

    <!-- 인증서 비밀번호 -->
    <div class="field-group">
      <label class="field-label field-label--md">인증서 비밀번호</label>
      <input type="password" id="certPassword" class="input-password" placeholder="인증서 비밀번호를 입력하세요" style="width:100%">
    </div>

    <!-- 모달 푸터 -->
    <div class="modal-footer">
      <button id="btnCertRegister" class="btn btn-cert-register">인증서 등록</button>
      <button id="btnCertReset" class="btn btn-modal-reset">초기화</button>
      <button id="btnCertClose" class="btn btn-close">닫기</button>
    </div>

  </div>
</div>

<!-- JS -->
<script src="js/app.js"></script>

</body>
</html>
