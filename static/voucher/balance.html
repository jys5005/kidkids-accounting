<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>잔액비교 - 키드키즈 회계</title>

  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/header.css">
  <link rel="stylesheet" href="../css/sidebar.css">

  <style>
    .balance-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .balance-toolbar__left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toggle-tabs {
      display: inline-flex;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      overflow: hidden;
    }
    .toggle-tab {
      padding: 5px 16px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      background: #fff;
      color: #64748b;
      border: none;
      transition: all 0.15s;
    }
    .toggle-tab--active { background: #14b8a6; color: #fff; }
    .toggle-tab:not(.toggle-tab--active):hover { background: #f1f5f9; }
    .filter-select {
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      padding: 5px 8px;
      font-size: 11px;
      background: #fff;
    }

    /* Summary cards */
    .balance-summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }
    .balance-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 14px;
    }
    .balance-card__label {
      font-size: 11px;
      color: #64748b;
      margin-bottom: 4px;
    }
    .balance-card__value {
      font-size: 16px;
      font-weight: 700;
    }
    .balance-card__value--bank { color: #2563eb; }
    .balance-card__value--book { color: #7c3aed; }
    .balance-card__value--diff { color: #dc2626; }
    .balance-card__value--match { color: #22c55e; }

    .data-table {
      width: 100%;
      font-size: 11px;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      overflow: hidden;
    }
    .data-table th {
      padding: 8px 10px;
      text-align: center;
      font-weight: 700;
      color: #334155;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      border-right: 1px solid #f1f5f9;
      white-space: nowrap;
    }
    .data-table th:last-child { border-right: none; }
    .data-table td {
      padding: 7px 10px;
      border-bottom: 1px solid #f1f5f9;
      border-right: 1px solid #f1f5f9;
      color: #475569;
    }
    .data-table td:last-child { border-right: none; }
    .data-table tr:hover { background: #f8fafc; }
    .td-center { text-align: center; }
    .td-right { text-align: right; font-variant-numeric: tabular-nums; }
    .match-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 10px;
      font-weight: 700;
    }
    .match-badge--ok { background: #dcfce7; color: #15803d; }
    .match-badge--mismatch { background: #fee2e2; color: #dc2626; }
    .diff-cell--negative { color: #dc2626; font-weight: 600; }
    .diff-cell--zero { color: #22c55e; }
  </style>
</head>
<body>
<div class="app-container">

  <div id="header">
    <div class="header-band1">
      <div class="logo">키드키즈 <span class="logo-sub">회계관리</span></div>
      <nav class="category-nav">
        <div class="category-item category-item--active"><div class="category-icon category-icon--active">&#128200;</div><span class="category-label">회계</span></div>
        <div class="category-item"><div class="category-icon">&#128176;</div><span class="category-label">급여</span></div>
        <div class="category-item"><div class="category-icon">&#128218;</div><span class="category-label">서식</span></div>
        <div class="category-item"><div class="category-icon">&#9881;</div><span class="category-label">설정</span></div>
      </nav>
      <div class="user-area">
        <span class="center-name-btn">햇살어린이집 &#9662;</span>
        <span class="timer">29:45</span>
        <button class="logout-btn">로그아웃</button>
      </div>
    </div>
    <div class="header-band2">
      <a href="../accounting.html" class="gnb-item">회계현황</a>
      <a href="../budget/create.html" class="gnb-item">예산</a>
      <a href="input.html" class="gnb-item gnb-item--active">전표</a>
      <a class="gnb-item">결산</a>
      <a class="gnb-item">업무관리</a>
      <a class="gnb-item">고정자산</a>
    </div>
    <div class="header-band3">
      <div class="sub-tab-bar">
        <a href="input.html" class="sub-tab-item">전표입력</a>
        <a href="deleted.html" class="sub-tab-item">삭제전표</a>
        <a href="balance.html" class="sub-tab-item sub-tab-item--active">잔액비교</a>
        <a href="transactions.html" class="sub-tab-item">거래내역</a>
      </div>
    </div>
  </div>

  <div class="main-area">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-title">회계</div>
      <div class="sidebar-menu-item">회계현황 <span class="chevron">&#9654;</span></div>
      <div class="sidebar-submenu"><a href="../accounting.html" class="sidebar-submenu-item">회계현황</a></div>
      <div class="sidebar-menu-item">예산 <span class="chevron">&#9654;</span></div>
      <div class="sidebar-submenu">
        <a href="../budget/create.html" class="sidebar-submenu-item">예산작성</a>
        <a href="../budget/transfer.html" class="sidebar-submenu-item">과목전용</a>
        <a href="../budget/report.html" class="sidebar-submenu-item">예산보고서</a>
        <a href="../budget/execution.html" class="sidebar-submenu-item">예산대비집행현황</a>
      </div>
      <div class="sidebar-menu-item sidebar-menu-item--open">전표 <span class="chevron chevron--open">&#9654;</span></div>
      <div class="sidebar-submenu is-open">
        <a href="input.html" class="sidebar-submenu-item">전표입력</a>
        <a href="deleted.html" class="sidebar-submenu-item">삭제전표</a>
        <a href="balance.html" class="sidebar-submenu-item sidebar-submenu-item--active">잔액비교</a>
        <a href="transactions.html" class="sidebar-submenu-item">거래내역</a>
      </div>
      <div class="sidebar-footer">
        <div class="sidebar-center-card"><strong>햇살어린이집</strong>인가번호: 12345<br>원장: 김영희</div>
      </div>
    </aside>

    <main id="content" class="content-area">
      <div class="page-wrapper">

        <div class="balance-toolbar">
          <div class="balance-toolbar__left">
            <select class="filter-select"><option>2025년 3월</option><option>2025년 2월</option><option>2025년 1월</option></select>
            <div class="toggle-tabs">
              <button class="toggle-tab toggle-tab--active">월별</button>
              <button class="toggle-tab">일별</button>
            </div>
          </div>
        </div>

        <!-- Summary -->
        <div class="balance-summary">
          <div class="balance-card">
            <div class="balance-card__label">은행잔액 (3월말)</div>
            <div class="balance-card__value balance-card__value--bank" id="bankTotal">6,812,500</div>
          </div>
          <div class="balance-card">
            <div class="balance-card__label">회계잔액 (3월말)</div>
            <div class="balance-card__value balance-card__value--book" id="bookTotal">6,780,000</div>
          </div>
          <div class="balance-card">
            <div class="balance-card__label">차이</div>
            <div class="balance-card__value balance-card__value--diff" id="diffTotal">32,500</div>
          </div>
        </div>

        <!-- Table -->
        <table class="data-table">
          <thead>
            <tr>
              <th style="width:120px">날짜</th>
              <th style="width:150px">은행잔액</th>
              <th style="width:150px">회계잔액</th>
              <th style="width:120px">차이</th>
              <th>불일치사유</th>
              <th style="width:80px">상태</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>

      </div>
    </main>
  </div>
</div>

<script>
var basePath = '../';

function fmt(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ','); }

var balanceData = [
  { date: '2025-03-01', bank: 3250000, book: 3250000, reason: '' },
  { date: '2025-03-03', bank: 13185000, book: 13185000, reason: '' },
  { date: '2025-03-05', bank: 1385000, bank: 1535000, book: 1535000, reason: '' },
  { date: '2025-03-06', bank: 1030000, book: 1030000, reason: '' },
  { date: '2025-03-07', bank: 730000, book: 730000, reason: '' },
  { date: '2025-03-08', bank: 7367500, book: 7335000, reason: '은행 이자 32,500원 미반영' },
  { date: '2025-03-10', bank: 6942500, book: 6910000, reason: '은행 이자 차이 이월' },
  { date: '2025-03-11', bank: 6864500, book: 6832000, reason: '' },
  { date: '2025-03-12', bank: 6697500, book: 6665000, reason: '' },
  { date: '2025-03-13', bank: 6517500, book: 6485000, reason: '' },
  { date: '2025-03-14', bank: 6262500, book: 6230000, reason: '' },
  { date: '2025-03-15', bank: 6162500, book: 6130000, reason: '' },
  { date: '2025-03-17', bank: 6097500, book: 6065000, reason: '' },
  { date: '2025-03-18', bank: 5832500, book: 5800000, reason: '' },
  { date: '2025-03-19', bank: 5702500, book: 5670000, reason: '' },
  { date: '2025-03-20', bank: 5639500, book: 5607000, reason: '' },
  { date: '2025-03-21', bank: 5384500, book: 5352000, reason: '' },
  { date: '2025-03-22', bank: 5234500, book: 5202000, reason: '' },
  { date: '2025-03-24', bank: 5012500, book: 4980000, reason: '' },
  { date: '2025-03-25', bank: 4852500, book: 4820000, reason: '' },
  { date: '2025-03-26', bank: 4676500, book: 4644000, reason: '' },
  { date: '2025-03-27', bank: 6812500, book: 6780000, reason: '' }
];

function renderTable() {
  var tbody = document.getElementById('tableBody');
  tbody.innerHTML = balanceData.map(function(r) {
    var diff = r.bank - r.book;
    var diffCls = diff === 0 ? 'diff-cell--zero' : 'diff-cell--negative';
    var matchBadge = diff === 0
      ? '<span class="match-badge match-badge--ok">일치</span>'
      : '<span class="match-badge match-badge--mismatch">불일치</span>';
    return '<tr>' +
      '<td class="td-center">' + r.date + '</td>' +
      '<td class="td-right">' + fmt(r.bank) + '</td>' +
      '<td class="td-right">' + fmt(r.book) + '</td>' +
      '<td class="td-right ' + diffCls + '">' + (diff === 0 ? '0' : fmt(diff)) + '</td>' +
      '<td style="font-size:10px">' + (r.reason || '-') + '</td>' +
      '<td class="td-center">' + matchBadge + '</td>' +
    '</tr>';
  }).join('');
}

document.addEventListener('DOMContentLoaded', function() {
  renderTable();

  document.querySelectorAll('.toggle-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.toggle-tab').forEach(function(t) { t.classList.remove('toggle-tab--active'); });
      this.classList.add('toggle-tab--active');
    });
  });

  document.querySelectorAll('.sidebar-menu-item').forEach(function(item) {
    item.addEventListener('click', function() {
      this.classList.toggle('sidebar-menu-item--open');
      var chevron = this.querySelector('.chevron');
      if (chevron) chevron.classList.toggle('chevron--open');
      var sub = this.nextElementSibling;
      if (sub && sub.classList.contains('sidebar-submenu')) sub.classList.toggle('is-open');
    });
  });
});
</script>
</body>
</html>
