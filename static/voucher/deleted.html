<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>삭제전표 - 키드키즈 회계</title>

  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/header.css">
  <link rel="stylesheet" href="../css/sidebar.css">

  <style>
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      margin-bottom: 12px;
    }
    .filter-bar label { font-size: 11px; font-weight: 600; color: #334155; }
    .filter-input {
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 11px;
      background: #fff;
    }
    .btn-sm {
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 4px;
      cursor: pointer;
      border: none;
    }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }

    .data-table {
      width: 100%;
      font-size: 11px;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      overflow: hidden;
    }
    .data-table th {
      padding: 8px;
      text-align: center;
      font-weight: 700;
      color: #334155;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      border-right: 1px solid #f1f5f9;
      white-space: nowrap;
    }
    .data-table th:last-child { border-right: none; }
    .data-table td {
      padding: 8px;
      border-bottom: 1px solid #f1f5f9;
      border-right: 1px solid #f1f5f9;
      color: #475569;
    }
    .data-table td:last-child { border-right: none; }
    .data-table tr:hover { background: #f8fafc; }
    .td-center { text-align: center; }
    .td-right { text-align: right; font-variant-numeric: tabular-nums; }
    .td-left { text-align: left; }
    .type-badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
    }
    .type-badge--income { background: #dbeafe; color: #1d4ed8; }
    .type-badge--expense { background: #fee2e2; color: #dc2626; }
    .btn-restore {
      padding: 3px 10px;
      font-size: 10px;
      font-weight: 600;
      border-radius: 3px;
      background: #eff6ff;
      color: #2563eb;
      cursor: pointer;
      border: none;
    }
    .btn-restore:hover { background: #dbeafe; }
    .empty-state {
      text-align: center;
      padding: 40px;
      color: #94a3b8;
      font-size: 12px;
    }
  </style>
</head>
<body>
<div class="app-container">

  <div id="header">
    <div class="header-band1">
      <div class="logo">키드키즈 <span class="logo-sub">회계관리</span></div>
      <nav class="category-nav">
        <div class="category-item category-item--active"><div class="category-icon category-icon--active">&#128200;</div><span class="category-label">회계</span></div>
        <div class="category-item"><div class="category-icon">&#128176;</div><span class="category-label">급여</span></div>
        <div class="category-item"><div class="category-icon">&#128218;</div><span class="category-label">서식</span></div>
        <div class="category-item"><div class="category-icon">&#9881;</div><span class="category-label">설정</span></div>
      </nav>
      <div class="user-area">
        <span class="center-name-btn">햇살어린이집 &#9662;</span>
        <span class="timer">29:45</span>
        <button class="logout-btn">로그아웃</button>
      </div>
    </div>
    <div class="header-band2">
      <a href="../accounting.html" class="gnb-item">회계현황</a>
      <a href="../budget/create.html" class="gnb-item">예산</a>
      <a href="input.html" class="gnb-item gnb-item--active">전표</a>
      <a class="gnb-item">결산</a>
      <a class="gnb-item">업무관리</a>
      <a class="gnb-item">고정자산</a>
    </div>
    <div class="header-band3">
      <div class="sub-tab-bar">
        <a href="input.html" class="sub-tab-item">전표입력</a>
        <a href="deleted.html" class="sub-tab-item sub-tab-item--active">삭제전표</a>
        <a href="balance.html" class="sub-tab-item">잔액비교</a>
        <a href="transactions.html" class="sub-tab-item">거래내역</a>
      </div>
    </div>
  </div>

  <div class="main-area">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-title">회계</div>
      <div class="sidebar-menu-item">회계현황 <span class="chevron">&#9654;</span></div>
      <div class="sidebar-submenu"><a href="../accounting.html" class="sidebar-submenu-item">회계현황</a></div>
      <div class="sidebar-menu-item">예산 <span class="chevron">&#9654;</span></div>
      <div class="sidebar-submenu">
        <a href="../budget/create.html" class="sidebar-submenu-item">예산작성</a>
        <a href="../budget/transfer.html" class="sidebar-submenu-item">과목전용</a>
        <a href="../budget/report.html" class="sidebar-submenu-item">예산보고서</a>
        <a href="../budget/execution.html" class="sidebar-submenu-item">예산대비집행현황</a>
      </div>
      <div class="sidebar-menu-item sidebar-menu-item--open">전표 <span class="chevron chevron--open">&#9654;</span></div>
      <div class="sidebar-submenu is-open">
        <a href="input.html" class="sidebar-submenu-item">전표입력</a>
        <a href="deleted.html" class="sidebar-submenu-item sidebar-submenu-item--active">삭제전표</a>
        <a href="balance.html" class="sidebar-submenu-item">잔액비교</a>
        <a href="transactions.html" class="sidebar-submenu-item">거래내역</a>
      </div>
      <div class="sidebar-footer">
        <div class="sidebar-center-card"><strong>햇살어린이집</strong>인가번호: 12345<br>원장: 김영희</div>
      </div>
    </aside>

    <main id="content" class="content-area">
      <div class="page-wrapper">

        <div class="section-header">
          <h1 class="section-title">삭제전표</h1>
        </div>

        <div class="filter-bar">
          <label>기간</label>
          <input type="date" class="filter-input" value="2025-03-01">
          <span style="color:#94a3b8">~</span>
          <input type="date" class="filter-input" value="2025-03-31">
          <button class="btn-sm btn-primary">검색</button>
        </div>

        <table class="data-table">
          <thead>
            <tr>
              <th style="width:50px">번호</th>
              <th style="width:100px">삭제일</th>
              <th style="width:70px">원전표번호</th>
              <th style="width:100px">출납일</th>
              <th style="width:50px">구분</th>
              <th style="width:100px">계정</th>
              <th>적요</th>
              <th style="width:110px">금액</th>
              <th>삭제사유</th>
              <th style="width:70px">복원</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>

      </div>
    </main>
  </div>
</div>

<script>
var basePath = '../';

function fmt(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ','); }

var deletedVouchers = [
  { id: 1, deleteDate: '2025-03-12', origNo: 15, cashDate: '2025-03-05', type: 'expense', account: '인건비', summary: '3월 교사수당(최정은) - 금액오류', amount: 180000, reason: '금액 입력 오류 (150,000원으로 재입력)' },
  { id: 2, deleteDate: '2025-03-14', origNo: 22, cashDate: '2025-03-08', type: 'expense', account: '보육활동비', summary: '채소류 구입 - 중복입력', amount: 125000, reason: '중복 입력된 전표 삭제' },
  { id: 3, deleteDate: '2025-03-18', origNo: 30, cashDate: '2025-03-12', type: 'expense', account: '관리운영비', summary: '청소용품 구입', amount: 32000, reason: '거래 취소됨' },
  { id: 4, deleteDate: '2025-03-20', origNo: 35, cashDate: '2025-03-15', type: 'expense', account: '보육활동비', summary: '채소류 2차 구입 - 계정 오류', amount: 98000, reason: '계정과목 변경 (급식비 -> 간식비)' },
  { id: 5, deleteDate: '2025-03-22', origNo: 41, cashDate: '2025-03-19', type: 'expense', account: '보육활동비', summary: '계란 구입 - 영수증 분실', amount: 52000, reason: '증빙서류 분실로 재처리' }
];

function renderTable() {
  var tbody = document.getElementById('tableBody');
  tbody.innerHTML = deletedVouchers.map(function(v) {
    var typeBadge = v.type === 'income'
      ? '<span class="type-badge type-badge--income">수입</span>'
      : '<span class="type-badge type-badge--expense">지출</span>';
    return '<tr>' +
      '<td class="td-center">' + v.id + '</td>' +
      '<td class="td-center">' + v.deleteDate + '</td>' +
      '<td class="td-center">' + v.origNo + '</td>' +
      '<td class="td-center">' + v.cashDate + '</td>' +
      '<td class="td-center">' + typeBadge + '</td>' +
      '<td class="td-left">' + v.account + '</td>' +
      '<td class="td-left">' + v.summary + '</td>' +
      '<td class="td-right">' + fmt(v.amount) + '</td>' +
      '<td class="td-left" style="font-size:10px">' + v.reason + '</td>' +
      '<td class="td-center"><button class="btn-restore" onclick="restoreVoucher(' + v.id + ')">복원</button></td>' +
    '</tr>';
  }).join('');
}

function restoreVoucher(id) {
  if (confirm('전표를 복원하시겠습니까?')) {
    deletedVouchers = deletedVouchers.filter(function(v) { return v.id !== id; });
    renderTable();
  }
}

document.addEventListener('DOMContentLoaded', function() {
  renderTable();
  document.querySelectorAll('.sidebar-menu-item').forEach(function(item) {
    item.addEventListener('click', function() {
      this.classList.toggle('sidebar-menu-item--open');
      var chevron = this.querySelector('.chevron');
      if (chevron) chevron.classList.toggle('chevron--open');
      var sub = this.nextElementSibling;
      if (sub && sub.classList.contains('sidebar-submenu')) sub.classList.toggle('is-open');
    });
  });
});
</script>
</body>
</html>
