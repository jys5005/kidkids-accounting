<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/header.css">
  <link rel="stylesheet" href="../css/sidebar.css">

  <style>
    /* Mode tabs */
    .mode-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 10px;
    }
    .mode-tab {
      padding: 7px 18px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      background: #fff;
      color: #64748b;
      border: 1px solid #e2e8f0;
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      margin-right: -1px;
      transition: all 0.15s;
    }
    .mode-tab--active {
      background: #14b8a6;
      color: #fff;
      border-color: #14b8a6;
      z-index: 1;
      position: relative;
    }
    .mode-tab:not(.mode-tab--active):hover { background: #f8fafc; }

    /* Filter bar */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 12px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .filter-bar label {
      font-size: 11px;
      font-weight: 600;
      color: #334155;
      white-space: nowrap;
    }
    .filter-input {
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 11px;
      background: #fff;
    }
    .filter-input[type="date"] { min-width: 120px; }
    .filter-select {
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 11px;
      background: #fff;
      min-width: 100px;
    }
    .filter-toggle {
      display: inline-flex;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      overflow: hidden;
    }
    .filter-toggle__btn {
      padding: 4px 12px;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      background: #fff;
      color: #64748b;
      border: none;
    }
    .filter-toggle__btn--active { background: #3b82f6; color: #fff; }
    .btn-sm {
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 4px;
      cursor: pointer;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-outline { background: #fff; color: #475569; border: 1px solid #e2e8f0; }
    .btn-outline:hover { background: #f8fafc; }

    /* Voucher table */
    .voucher-table-wrap {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      overflow-x: auto;
    }
    .voucher-table {
      width: 100%;
      min-width: 1200px;
      font-size: 11px;
      border-collapse: collapse;
    }
    .voucher-table th {
      padding: 7px 6px;
      text-align: center;
      font-weight: 700;
      color: #334155;
      background: #fde047;
      border-bottom: 1px solid #e2e8f0;
      border-right: 1px solid rgba(0,0,0,0.06);
      white-space: nowrap;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .voucher-table th:last-child { border-right: none; }
    .voucher-table td {
      padding: 5px 6px;
      border-bottom: 1px solid #f1f5f9;
      border-right: 1px solid #f8fafc;
      color: #475569;
      white-space: nowrap;
    }
    .voucher-table td:last-child { border-right: none; }
    .voucher-table tbody tr:hover { background: #f8fafc; }
    .voucher-table .td-center { text-align: center; }
    .voucher-table .td-right { text-align: right; font-variant-numeric: tabular-nums; }
    .voucher-table .td-left { text-align: left; }

    /* Type badges */
    .type-badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
    }
    .type-badge--income { background: #dbeafe; color: #1d4ed8; }
    .type-badge--expense { background: #fee2e2; color: #dc2626; }

    /* Evidence badges */
    .evidence-badge {
      display: inline-block;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 600;
      white-space: nowrap;
    }
    .evidence-badge--tax { background: #dcfce7; color: #15803d; }
    .evidence-badge--cash { background: #e0e7ff; color: #4338ca; }
    .evidence-badge--card { background: #fce7f3; color: #be185d; }
    .evidence-badge--bank { background: #fef3c7; color: #92400e; }
    .evidence-badge--etc { background: #f1f5f9; color: #64748b; }

    /* Totals row */
    .voucher-table .row-total {
      background: #f8fafc;
      font-weight: 700;
    }
    .voucher-table .row-total td {
      border-top: 2px solid #e2e8f0;
      padding: 8px 6px;
    }

    /* New entry row */
    .voucher-table .row-new {
      background: #fffbeb;
    }
    .voucher-table .row-new td {
      padding: 4px 4px;
    }
    .row-input {
      width: 100%;
      border: 1px solid #e2e8f0;
      border-radius: 3px;
      padding: 3px 5px;
      font-size: 10px;
      background: #fff;
    }
    .row-input:focus { border-color: #60a5fa; }
    .row-select {
      border: 1px solid #e2e8f0;
      border-radius: 3px;
      padding: 3px 4px;
      font-size: 10px;
      background: #fff;
      width: 100%;
    }

    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      margin-top: 12px;
    }
    .page-btn {
      padding: 4px 10px;
      font-size: 11px;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      background: #fff;
      color: #475569;
      cursor: pointer;
    }
    .page-btn:hover { background: #f1f5f9; }
    .page-btn--active { background: #14b8a6; color: #fff; border-color: #14b8a6; }

    /* Bottom totals bar */
    .totals-bar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 24px;
      padding: 10px 16px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      margin-top: 10px;
      font-size: 12px;
      font-weight: 700;
    }
    .totals-bar__item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .totals-bar__label { color: #64748b; font-weight: 500; }
    .totals-bar__value--income { color: #2563eb; }
    .totals-bar__value--expense { color: #dc2626; }
  </style>
</head>

function renderVoucherTable() {
  var tbody = document.getElementById('voucherBody');
  var totalIncome = 0, totalExpense = 0;

  // New entry row
  var html = '<tr class="row-new">' +
    '<td class="td-center"></td>' +
    '<td class="td-center" style="color:#94a3b8">NEW</td>' +
    '<td class="td-center">-</td>' +
    '<td><input type="date" class="row-input" value="2025-03-27"></td>' +
    '<td><select class="row-select"><option>수입</option><option>지출</option></select></td>' +
    '<td><select class="row-select"><option value="">선택</option><option>인건비</option><option>관리운영비</option><option>보육활동비</option><option>보조금수입</option><option>부모부담수입</option></select></td>' +
    '<td><select class="row-select"><option value="">선택</option></select></td>' +
    '<td><input type="text" class="row-input" placeholder="적요 입력"></td>' +
    '<td><input type="text" class="row-input" placeholder="거래처"></td>' +
    '<td><input type="text" class="row-input" style="text-align:right" placeholder="0"></td>' +
    '<td><input type="text" class="row-input" style="text-align:right" placeholder="0"></td>' +
    '<td><select class="row-select"><option>세금계산서</option><option>현금영수증</option><option>카드전표</option><option>통장입금</option><option>기타</option></select></td>' +
  '</tr>';

  vouchers.forEach(function(v) {
    totalIncome += v.income;
    totalExpense += v.expense;
    var typeBadge = v.type === 'income'
      ? '<span class="type-badge type-badge--income">수입</span>'
      : '<span class="type-badge type-badge--expense">지출</span>';
    html += '<tr>' +
      '<td class="td-center"><input type="checkbox" class="row-check"></td>' +
      '<td class="td-center">' + v.no + '</td>' +
      '<td class="td-center" style="font-size:10px;color:#94a3b8">' + v.inputDate + '</td>' +
      '<td class="td-center">' + v.cashDate + '</td>' +
      '<td class="td-center">' + typeBadge + '</td>' +
      '<td class="td-left">' + v.account + '</td>' +
      '<td class="td-left">' + v.detail + '</td>' +
      '<td class="td-left">' + v.summary + '</td>' +
      '<td class="td-left">' + v.vendor + '</td>' +
      '<td class="td-right">' + (v.income > 0 ? fmt(v.income) : '') + '</td>' +
      '<td class="td-right">' + (v.expense > 0 ? fmt(v.expense) : '') + '</td>' +
      '<td class="td-center">' + evBadge(v.evidence) + '</td>' +
    '</tr>';
  });

  // Total row
  html += '<tr class="row-total">' +
    '<td colspan="9" style="text-align:right;padding-right:12px">합계</td>' +
    '<td class="td-right" style="color:#2563eb">' + fmt(totalIncome) + '</td>' +
    '<td class="td-right" style="color:#dc2626">' + fmt(totalExpense) + '</td>' +
    '<td></td>' +
  '</tr>';

  tbody.innerHTML = html;
  document.getElementById('totalIncome').textContent = fmt(totalIncome);
  document.getElementById('totalExpense').textContent = fmt(totalExpense);
}

document.addEventListener('DOMContentLoaded', function() {
  renderVoucherTable();

  // Check all
  document.getElementById('checkAll').addEventListener('change', function() {
    var checked = this.checked;
    document.querySelectorAll('.row-check').forEach(function(cb) { cb.checked = checked; });
  });

  // Mode tabs
  document.querySelectorAll('.mode-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.mode-tab').forEach(function(t) { t.classList.remove('mode-tab--active'); });
      this.classList.add('mode-tab--active');
    });
  });

  // Filter toggles
  document.querySelectorAll('.filter-toggle__btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      this.parentElement.querySelectorAll('.filter-toggle__btn').forEach(function(b) { b.classList.remove('filter-toggle__btn--active'); });
      this.classList.add('filter-toggle__btn--active');
    });
  });

  // Sidebar toggle
  document.querySelectorAll('.sidebar-menu-item').forEach(function(item) {
    item.addEventListener('click', function() {
      this.classList.toggle('sidebar-menu-item--open');
      var chevron = this.querySelector('.chevron');
      if (chevron) chevron.classList.toggle('chevron--open');
      var sub = this.nextElementSibling;
      if (sub && sub.classList.contains('sidebar-submenu')) sub.classList.toggle('is-open');
    });
  });

  // Column sort (click header to sort)
  document.querySelectorAll('.voucher-table th').forEach(function(th, idx) {
    if (idx < 2) return; // skip checkbox & no
    th.style.cursor = 'pointer';
    th.addEventListener('click', function() {
      // Simple visual feedback
      document.querySelectorAll('.voucher-table th').forEach(function(h) { h.style.background = '#fde047'; });
      this.style.background = '#fbbf24';
    });
  });
});
</script>
