<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회계현황 - 키드키즈 회계</title>

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/sidebar.css">

  <style>
    /* ===== Page-specific: accounting dashboard ===== */
    .dashboard-title-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .dashboard-title {
      font-size: 16px;
      font-weight: 700;
      color: #0f172a;
    }
    .month-selector {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .month-selector button {
      width: 28px;
      height: 28px;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .month-selector button:hover { background: #f1f5f9; }
    .month-display {
      font-size: 13px;
      font-weight: 600;
      color: #334155;
      padding: 0 8px;
    }

    /* Summary cards */
    .summary-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    .summary-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 16px;
    }
    .summary-card__label {
      font-size: 11px;
      font-weight: 500;
      color: #64748b;
      margin-bottom: 6px;
    }
    .summary-card__value {
      font-size: 18px;
      font-weight: 700;
      color: #0f172a;
    }
    .summary-card__value--income { color: #2563eb; }
    .summary-card__value--expense { color: #dc2626; }
    .summary-card__value--balance { color: #059669; }
    .summary-card__value--carry { color: #7c3aed; }

    /* Evaluation grid */
    .eval-section-title {
      font-size: 13px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 12px;
    }
    .eval-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    .eval-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 14px;
    }
    .eval-card__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .eval-card__title {
      font-size: 11px;
      font-weight: 600;
      color: #334155;
    }
    .eval-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 10px;
      font-weight: 700;
    }
    .eval-badge--ok { background: #dcfce7; color: #15803d; }
    .eval-badge--warn { background: #fef9c3; color: #a16207; }
    .eval-badge--over { background: #fee2e2; color: #dc2626; }
    .eval-card__amount {
      font-size: 14px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 8px;
    }
    .progress-bar {
      height: 6px;
      background: #e2e8f0;
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-bar__fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s;
    }
    .progress-bar__fill--ok { background: #22c55e; }
    .progress-bar__fill--warn { background: #eab308; }
    .progress-bar__fill--over { background: #ef4444; }

    /* Monthly trend */
    .trend-section {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 16px;
    }
    .trend-section__title {
      font-size: 12px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 10px;
    }
    .trend-table {
      width: 100%;
      font-size: 11px;
      border-collapse: collapse;
    }
    .trend-table th {
      padding: 6px 8px;
      text-align: center;
      font-weight: 700;
      color: #334155;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
    }
    .trend-table td {
      padding: 6px 8px;
      text-align: right;
      border-bottom: 1px solid #f1f5f9;
      color: #475569;
    }
    .trend-table td:first-child { text-align: center; }
  </style>
</head>
<body>
<div class="app-container">

  <!-- ===== HEADER ===== -->
  <div id="header">
    <!-- Band 1 -->
    <div class="header-band1">
      <div class="logo">키드키즈 <span class="logo-sub">회계관리</span></div>
      <nav class="category-nav">
        <div class="category-item category-item--active">
          <div class="category-icon category-icon--active">&#128200;</div>
          <span class="category-label">회계</span>
        </div>
        <div class="category-item">
          <div class="category-icon">&#128176;</div>
          <span class="category-label">급여</span>
        </div>
        <div class="category-item">
          <div class="category-icon">&#128218;</div>
          <span class="category-label">서식</span>
        </div>
        <div class="category-item">
          <div class="category-icon">&#9881;</div>
          <span class="category-label">설정</span>
        </div>
      </nav>
      <div class="user-area">
        <span class="center-name-btn">햇살어린이집 &#9662;</span>
        <span class="timer">29:45</span>
        <button class="logout-btn">로그아웃</button>
      </div>
    </div>
    <!-- Band 2: GNB -->
    <div class="header-band2">
      <a href="accounting.html" class="gnb-item gnb-item--active">회계현황</a>
      <a href="budget/create.html" class="gnb-item">예산</a>
      <a href="voucher/input.html" class="gnb-item">전표</a>
      <a class="gnb-item">결산</a>
      <a class="gnb-item">업무관리</a>
      <a class="gnb-item">고정자산</a>
    </div>
  </div>

  <!-- ===== MAIN ===== -->
  <div class="main-area">

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-title">회계</div>
      <div class="sidebar-menu-item sidebar-menu-item--open">
        회계현황 <span class="chevron chevron--open">&#9654;</span>
      </div>
      <div class="sidebar-submenu is-open">
        <a href="accounting.html" class="sidebar-submenu-item sidebar-submenu-item--active">회계현황</a>
      </div>
      <div class="sidebar-menu-item">
        예산 <span class="chevron">&#9654;</span>
      </div>
      <div class="sidebar-submenu">
        <a href="budget/create.html" class="sidebar-submenu-item">예산작성</a>
        <a href="budget/transfer.html" class="sidebar-submenu-item">과목전용</a>
        <a href="budget/report.html" class="sidebar-submenu-item">예산보고서</a>
        <a href="budget/execution.html" class="sidebar-submenu-item">예산대비집행현황</a>
      </div>
      <div class="sidebar-menu-item">
        전표 <span class="chevron">&#9654;</span>
      </div>
      <div class="sidebar-submenu">
        <a href="voucher/input.html" class="sidebar-submenu-item">전표입력</a>
        <a href="voucher/deleted.html" class="sidebar-submenu-item">삭제전표</a>
        <a href="voucher/balance.html" class="sidebar-submenu-item">잔액비교</a>
        <a href="voucher/transactions.html" class="sidebar-submenu-item">거래내역</a>
      </div>
      <div class="sidebar-footer">
        <div class="sidebar-center-card">
          <strong>햇살어린이집</strong>
          인가번호: 12345<br>
          원장: 김영희<br>
          정원: 40명
        </div>
      </div>
    </aside>

    <!-- Content -->
    <main id="content" class="content-area">
      <div class="page-wrapper">

        <!-- Title bar -->
        <div class="dashboard-title-bar">
          <h1 class="dashboard-title">회계현황</h1>
          <div class="month-selector">
            <button id="btnPrevMonth">&#9664;</button>
            <span class="month-display" id="monthDisplay">2025년 3월</span>
            <button id="btnNextMonth">&#9654;</button>
          </div>
        </div>

        <!-- Summary cards -->
        <div class="summary-cards">
          <div class="summary-card">
            <div class="summary-card__label">수입 합계</div>
            <div class="summary-card__value summary-card__value--income">45,230,000</div>
          </div>
          <div class="summary-card">
            <div class="summary-card__label">지출 합계</div>
            <div class="summary-card__value summary-card__value--expense">38,450,000</div>
          </div>
          <div class="summary-card">
            <div class="summary-card__label">잔액</div>
            <div class="summary-card__value summary-card__value--balance">6,780,000</div>
          </div>
          <div class="summary-card">
            <div class="summary-card__label">전월이월</div>
            <div class="summary-card__value summary-card__value--carry">3,250,000</div>
          </div>
        </div>

        <!-- Evaluation section -->
        <div class="eval-section-title">평가항목</div>
        <div class="eval-grid" id="evalGrid">
          <!-- Rendered by JS -->
        </div>

        <!-- Monthly trend -->
        <div class="trend-section">
          <div class="trend-section__title">월별 추이</div>
          <table class="trend-table">
            <thead>
              <tr>
                <th>월</th><th>수입</th><th>지출</th><th>잔액</th>
              </tr>
            </thead>
            <tbody id="trendBody"></tbody>
          </table>
        </div>

      </div>
    </main>
  </div>
</div>

<script>
// ===== Mock data & rendering =====
var basePath = '';

var evalItems = [
  { title: '급식비(급식비평가)', amount: '4,500,000', status: 'ok', pct: 72 },
  { title: '필요경비(필요경비평가)', amount: '2,300,000', status: 'ok', pct: 55 },
  { title: '특별활동비(특별활동비평가)', amount: '1,800,000', status: 'warn', pct: 88 },
  { title: '대출금', amount: '0', status: 'ok', pct: 0 },
  { title: '관리운영비', amount: '8,200,000', status: 'warn', pct: 85 },
  { title: '원장급여', amount: '3,600,000', status: 'ok', pct: 60 },
  { title: '원장수당', amount: '1,200,000', status: 'over', pct: 105 },
  { title: '누리과정', amount: '5,100,000', status: 'ok', pct: 45 }
];

var trendData = [
  { m: '1월', income: '42,100,000', expense: '35,800,000', balance: '6,300,000' },
  { m: '2월', income: '43,500,000', expense: '37,200,000', balance: '6,300,000' },
  { m: '3월', income: '45,230,000', expense: '38,450,000', balance: '6,780,000' }
];

function renderEvalGrid() {
  var grid = document.getElementById('evalGrid');
  grid.innerHTML = evalItems.map(function(item) {
    var badgeCls = item.status === 'ok' ? 'eval-badge--ok' : (item.status === 'warn' ? 'eval-badge--warn' : 'eval-badge--over');
    var barCls = item.status === 'ok' ? 'progress-bar__fill--ok' : (item.status === 'warn' ? 'progress-bar__fill--warn' : 'progress-bar__fill--over');
    var badgeText = item.status === 'ok' ? '적정' : (item.status === 'warn' ? '주의' : '초과');
    var pctDisplay = Math.min(item.pct, 100);
    return '<div class="eval-card">' +
      '<div class="eval-card__header">' +
        '<span class="eval-card__title">' + item.title + '</span>' +
        '<span class="eval-badge ' + badgeCls + '">' + badgeText + '</span>' +
      '</div>' +
      '<div class="eval-card__amount">' + item.amount + '</div>' +
      '<div class="progress-bar"><div class="progress-bar__fill ' + barCls + '" style="width:' + pctDisplay + '%"></div></div>' +
    '</div>';
  }).join('');
}

function renderTrend() {
  var tbody = document.getElementById('trendBody');
  tbody.innerHTML = trendData.map(function(r) {
    return '<tr><td>' + r.m + '</td><td>' + r.income + '</td><td>' + r.expense + '</td><td>' + r.balance + '</td></tr>';
  }).join('');
}

// Month navigation
var currentYear = 2025, currentMonth = 3;
function updateMonthDisplay() {
  document.getElementById('monthDisplay').textContent = currentYear + '년 ' + currentMonth + '월';
}
document.addEventListener('DOMContentLoaded', function() {
  renderEvalGrid();
  renderTrend();
  document.getElementById('btnPrevMonth').addEventListener('click', function() {
    currentMonth--;
    if (currentMonth < 1) { currentMonth = 12; currentYear--; }
    updateMonthDisplay();
  });
  document.getElementById('btnNextMonth').addEventListener('click', function() {
    currentMonth++;
    if (currentMonth > 12) { currentMonth = 1; currentYear++; }
    updateMonthDisplay();
  });
  // Sidebar toggle
  document.querySelectorAll('.sidebar-menu-item').forEach(function(item) {
    item.addEventListener('click', function() {
      this.classList.toggle('sidebar-menu-item--open');
      var chevron = this.querySelector('.chevron');
      if (chevron) chevron.classList.toggle('chevron--open');
      var sub = this.nextElementSibling;
      if (sub && sub.classList.contains('sidebar-submenu')) sub.classList.toggle('is-open');
    });
  });
});
</script>
</body>
</html>
