<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>과목전용 - 키드키즈 회계</title>

  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/header.css">
  <link rel="stylesheet" href="../css/sidebar.css">

  <style>
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .filter-bar label {
      font-size: 11px;
      font-weight: 600;
      color: #334155;
      white-space: nowrap;
    }
    .filter-input, .filter-select {
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      padding: 5px 8px;
      font-size: 11px;
      background: #fff;
    }
    .filter-select { min-width: 120px; }
    .filter-input[type="date"] { min-width: 130px; }
    .btn-sm {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 4px;
      cursor: pointer;
      border: none;
    }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-success { background: #22c55e; color: #fff; }
    .btn-success:hover { background: #16a34a; }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn-outline {
      background: #fff;
      color: #475569;
      border: 1px solid #e2e8f0;
    }
    .btn-outline:hover { background: #f8fafc; }
    .action-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .action-bar__left {
      display: flex;
      gap: 6px;
    }

    .data-table {
      width: 100%;
      font-size: 11px;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      overflow: hidden;
    }
    .data-table th {
      padding: 8px;
      text-align: center;
      font-weight: 700;
      color: #334155;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      border-right: 1px solid #f1f5f9;
      white-space: nowrap;
    }
    .data-table th:last-child { border-right: none; }
    .data-table td {
      padding: 8px;
      text-align: center;
      border-bottom: 1px solid #f1f5f9;
      border-right: 1px solid #f1f5f9;
      color: #475569;
    }
    .data-table td:last-child { border-right: none; }
    .data-table tr:hover { background: #f8fafc; }
    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 10px;
      font-weight: 700;
    }
    .status-badge--approved { background: #dcfce7; color: #15803d; }
    .status-badge--pending { background: #fef9c3; color: #a16207; }
    .status-badge--rejected { background: #fee2e2; color: #dc2626; }
    .amount-cell { text-align: right !important; font-variant-numeric: tabular-nums; }
    .btn-row {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 600;
      border-radius: 3px;
      cursor: pointer;
      border: none;
    }
    .btn-row-edit { background: #eff6ff; color: #2563eb; }
    .btn-row-delete { background: #fee2e2; color: #dc2626; }
  </style>
</head>
<body>
<div class="app-container">

  <!-- HEADER -->
  <div id="header">
    <div class="header-band1">
      <div class="logo">키드키즈 <span class="logo-sub">회계관리</span></div>
      <nav class="category-nav">
        <div class="category-item category-item--active"><div class="category-icon category-icon--active">&#128200;</div><span class="category-label">회계</span></div>
        <div class="category-item"><div class="category-icon">&#128176;</div><span class="category-label">급여</span></div>
        <div class="category-item"><div class="category-icon">&#128218;</div><span class="category-label">서식</span></div>
        <div class="category-item"><div class="category-icon">&#9881;</div><span class="category-label">설정</span></div>
      </nav>
      <div class="user-area">
        <span class="center-name-btn">햇살어린이집 &#9662;</span>
        <span class="timer">29:45</span>
        <button class="logout-btn">로그아웃</button>
      </div>
    </div>
    <div class="header-band2">
      <a href="../accounting.html" class="gnb-item">회계현황</a>
      <a href="create.html" class="gnb-item gnb-item--active">예산</a>
      <a href="../voucher/input.html" class="gnb-item">전표</a>
      <a class="gnb-item">결산</a>
      <a class="gnb-item">업무관리</a>
      <a class="gnb-item">고정자산</a>
    </div>
    <div class="header-band3">
      <div class="sub-tab-bar">
        <a href="create.html" class="sub-tab-item">예산작성</a>
        <a href="transfer.html" class="sub-tab-item sub-tab-item--active">과목전용</a>
        <a href="report.html" class="sub-tab-item">예산보고서</a>
        <a href="execution.html" class="sub-tab-item">예산대비집행현황</a>
      </div>
    </div>
  </div>

  <div class="main-area">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-title">회계</div>
      <div class="sidebar-menu-item">회계현황 <span class="chevron">&#9654;</span></div>
      <div class="sidebar-submenu"><a href="../accounting.html" class="sidebar-submenu-item">회계현황</a></div>
      <div class="sidebar-menu-item sidebar-menu-item--open">예산 <span class="chevron chevron--open">&#9654;</span></div>
      <div class="sidebar-submenu is-open">
        <a href="create.html" class="sidebar-submenu-item">예산작성</a>
        <a href="transfer.html" class="sidebar-submenu-item sidebar-submenu-item--active">과목전용</a>
        <a href="report.html" class="sidebar-submenu-item">예산보고서</a>
        <a href="execution.html" class="sidebar-submenu-item">예산대비집행현황</a>
      </div>
      <div class="sidebar-menu-item">전표 <span class="chevron">&#9654;</span></div>
      <div class="sidebar-submenu">
        <a href="../voucher/input.html" class="sidebar-submenu-item">전표입력</a>
        <a href="../voucher/deleted.html" class="sidebar-submenu-item">삭제전표</a>
        <a href="../voucher/balance.html" class="sidebar-submenu-item">잔액비교</a>
        <a href="../voucher/transactions.html" class="sidebar-submenu-item">거래내역</a>
      </div>
      <div class="sidebar-footer">
        <div class="sidebar-center-card"><strong>햇살어린이집</strong>인가번호: 12345<br>원장: 김영희</div>
      </div>
    </aside>

    <main id="content" class="content-area">
      <div class="page-wrapper">

        <div class="section-header">
          <h1 class="section-title">과목전용</h1>
        </div>

        <!-- Filter bar -->
        <div class="filter-bar">
          <label>기간</label>
          <input type="date" class="filter-input" value="2025-01-01">
          <span style="color:#94a3b8">~</span>
          <input type="date" class="filter-input" value="2025-12-31">
          <label>과목</label>
          <select class="filter-select">
            <option value="">전체</option>
            <option>인건비</option>
            <option>관리운영비</option>
            <option>보육활동비</option>
          </select>
          <button class="btn-sm btn-primary">검색</button>
        </div>

        <!-- Action bar -->
        <div class="action-bar">
          <div class="action-bar__left">
            <button class="btn-sm btn-success" id="btnAdd">+ 추가</button>
            <button class="btn-sm btn-danger" id="btnDeleteSelected">선택 삭제</button>
          </div>
        </div>

        <!-- Table -->
        <table class="data-table">
          <thead>
            <tr>
              <th style="width:40px"><input type="checkbox" id="checkAll"></th>
              <th style="width:50px">번호</th>
              <th style="width:100px">전용일</th>
              <th style="width:180px">전용전 과목</th>
              <th style="width:180px">전용후 과목</th>
              <th style="width:120px">금액</th>
              <th>사유</th>
              <th style="width:90px">승인상태</th>
              <th style="width:100px">관리</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>

      </div>
    </main>
  </div>
</div>

<script>
var basePath = '../';

var transfers = [
  { id: 1, date: '2025-02-15', fromAccount: '관리운영비 > 시설관리비 > 수도광열비', toAccount: '보육활동비 > 급식비 > 급식비', amount: 500000, reason: '동절기 급식비 증가 대응', status: 'approved' },
  { id: 2, date: '2025-03-01', fromAccount: '인건비 > 보육교사인건비 > 교사수당', toAccount: '관리운영비 > 사무관리비 > 소모품비', amount: 300000, reason: '사무용품 긴급 구매', status: 'approved' },
  { id: 3, date: '2025-03-10', fromAccount: '보육활동비 > 교재교구비 > 교재교구구입비', toAccount: '보육활동비 > 특별활동비 > 특별활동비', amount: 200000, reason: '특별활동 강사료 부족', status: 'pending' },
  { id: 4, date: '2025-03-15', fromAccount: '관리운영비 > 시설관리비 > 통신비', toAccount: '관리운영비 > 시설관리비 > 전기요금', amount: 100000, reason: '전기요금 인상분 반영', status: 'pending' },
  { id: 5, date: '2025-03-20', fromAccount: '인건비 > 원장인건비 > 원장수당', toAccount: '보육활동비 > 급식비 > 간식비', amount: 150000, reason: '간식비 초과 대응', status: 'rejected' }
];

function fmt(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ','); }

function renderTable() {
  var tbody = document.getElementById('tableBody');
  tbody.innerHTML = transfers.map(function(t) {
    var statusCls = t.status === 'approved' ? 'status-badge--approved' : (t.status === 'pending' ? 'status-badge--pending' : 'status-badge--rejected');
    var statusText = t.status === 'approved' ? '승인' : (t.status === 'pending' ? '대기' : '반려');
    return '<tr>' +
      '<td><input type="checkbox" class="row-check" data-id="' + t.id + '"></td>' +
      '<td>' + t.id + '</td>' +
      '<td>' + t.date + '</td>' +
      '<td style="text-align:left;font-size:10px">' + t.fromAccount + '</td>' +
      '<td style="text-align:left;font-size:10px">' + t.toAccount + '</td>' +
      '<td class="amount-cell">' + fmt(t.amount) + '</td>' +
      '<td style="text-align:left">' + t.reason + '</td>' +
      '<td><span class="status-badge ' + statusCls + '">' + statusText + '</span></td>' +
      '<td><button class="btn-row btn-row-edit">수정</button> <button class="btn-row btn-row-delete">삭제</button></td>' +
    '</tr>';
  }).join('');
}

document.addEventListener('DOMContentLoaded', function() {
  renderTable();

  document.getElementById('checkAll').addEventListener('change', function() {
    var checked = this.checked;
    document.querySelectorAll('.row-check').forEach(function(cb) { cb.checked = checked; });
  });

  // Sidebar toggle
  document.querySelectorAll('.sidebar-menu-item').forEach(function(item) {
    item.addEventListener('click', function() {
      this.classList.toggle('sidebar-menu-item--open');
      var chevron = this.querySelector('.chevron');
      if (chevron) chevron.classList.toggle('chevron--open');
      var sub = this.nextElementSibling;
      if (sub && sub.classList.contains('sidebar-submenu')) sub.classList.toggle('is-open');
    });
  });
});
</script>
</body>
</html>
