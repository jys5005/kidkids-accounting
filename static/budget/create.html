<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>예산작성 - 키드키즈 회계</title>

  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/header.css">
  <link rel="stylesheet" href="../css/sidebar.css">

  <style>
    /* ===== Budget create page styles ===== */
    .budget-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 12px;
    }
    .budget-toolbar__left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .budget-toolbar__right {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .year-select {
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      padding: 5px 8px;
      font-size: 11px;
      background: #fff;
    }
    .toggle-tabs {
      display: inline-flex;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      overflow: hidden;
    }
    .toggle-tab {
      padding: 5px 16px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      background: #fff;
      color: #64748b;
      border: none;
      transition: all 0.15s;
    }
    .toggle-tab--active {
      background: #14b8a6;
      color: #fff;
    }
    .toggle-tab:not(.toggle-tab--active):hover { background: #f1f5f9; }
    .btn-icon {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      background: #fff;
      color: #475569;
      cursor: pointer;
    }
    .btn-icon:hover { background: #f8fafc; }

    /* Budget panels */
    .budget-panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .budget-panel {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      overflow: hidden;
    }
    .budget-panel__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid #e2e8f0;
    }
    .budget-panel__title {
      font-size: 13px;
      font-weight: 700;
      color: #0f172a;
    }
    .budget-panel__title--income { color: #2563eb; }
    .budget-panel__title--expense { color: #dc2626; }

    /* Budget table */
    .budget-table {
      width: 100%;
      font-size: 11px;
      border-collapse: collapse;
    }
    .budget-table th {
      padding: 7px 8px;
      text-align: center;
      font-weight: 700;
      color: #334155;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      border-right: 1px solid #f1f5f9;
      white-space: nowrap;
    }
    .budget-table th:last-child { border-right: none; }
    .budget-table td {
      padding: 5px 8px;
      border-bottom: 1px solid #f1f5f9;
      border-right: 1px solid #f1f5f9;
      color: #475569;
    }
    .budget-table td:last-child { border-right: none; }
    .budget-table .row-category {
      background: #eff6ff;
      font-weight: 700;
      color: #1e40af;
    }
    .budget-table .row-sub {
      padding-left: 20px;
      font-weight: 600;
      color: #334155;
    }
    .budget-table .row-detail {
      padding-left: 36px;
      color: #64748b;
    }
    .budget-table .row-total {
      background: #fef3c7;
      font-weight: 700;
      color: #92400e;
    }
    .amount-input {
      width: 100%;
      border: 1px solid #e2e8f0;
      border-radius: 3px;
      padding: 3px 6px;
      font-size: 11px;
      text-align: right;
      background: #fff;
    }
    .amount-input:focus { border-color: #60a5fa; }
    .amount-display {
      text-align: right;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .basis-input {
      width: 100%;
      border: 1px solid #e2e8f0;
      border-radius: 3px;
      padding: 3px 6px;
      font-size: 10px;
      background: #fff;
    }

    /* Balance check bar */
    .balance-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 12px 16px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
    }
    .balance-bar__item { display: flex; align-items: center; gap: 6px; }
    .balance-bar__label { color: #64748b; font-weight: 500; }
    .balance-bar__value--income { color: #2563eb; }
    .balance-bar__value--expense { color: #dc2626; }
    .balance-bar__eq { font-size: 16px; color: #22c55e; }
    .balance-bar__eq--mismatch { color: #dc2626; }
  </style>
</head>
<body>
<div class="app-container">

  <!-- HEADER -->
  <div id="header">
    <div class="header-band1">
      <div class="logo">키드키즈 <span class="logo-sub">회계관리</span></div>
      <nav class="category-nav">
        <div class="category-item category-item--active">
          <div class="category-icon category-icon--active">&#128200;</div>

        <div class="category-item"><div class="category-icon">&#128218;</div><span class="category-label">서식</span></div>

        <a href="create.html" class="sub-tab-item sub-tab-item--active">예산작성</a>

        <a href="report.html" class="sub-tab-item">예산보고서</a>

      </div>
    </div>
  </div>

  <div class="main-area">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-title">회계</div>
      <div class="sidebar-menu-item">회계현황 <span class="chevron">&#9654;</span></div>
      <div class="sidebar-submenu"><a href="../accounting.html" class="sidebar-submenu-item">회계현황</a></div>
      <div class="sidebar-menu-item sidebar-menu-item--open">예산 <span class="chevron chevron--open">&#9654;</span></div>
      <div class="sidebar-submenu is-open">
        <a href="create.html" class="sidebar-submenu-item sidebar-submenu-item--active">예산작성</a>
        <a href="transfer.html" class="sidebar-submenu-item">과목전용</a>
        <a href="report.html" class="sidebar-submenu-item">예산보고서</a>
        <a href="execution.html" class="sidebar-submenu-item">예산대비집행현황</a>
      </div>
      <div class="sidebar-menu-item">전표 <span class="chevron">&#9654;</span></div>
      <div class="sidebar-submenu">
        <a href="../voucher/input.html" class="sidebar-submenu-item">전표입력</a>
        <a href="../voucher/deleted.html" class="sidebar-submenu-item">삭제전표</a>
        <a href="../voucher/balance.html" class="sidebar-submenu-item">잔액비교</a>
        <a href="../voucher/transactions.html" class="sidebar-submenu-item">거래내역</a>
      </div>
      <div class="sidebar-footer">
        <div class="sidebar-center-card"><strong>햇살어린이집</strong>인가번호: 12345<br>원장: 김영희</div>
      </div>
    </aside>

    <!-- Content -->
    <main id="content" class="content-area">
      <div class="page-wrapper">

        <!-- Toolbar -->
        <div class="budget-toolbar">
          <div class="budget-toolbar__left">
            <select class="year-select" id="yearSelect">
              <option>2025년</option><option>2024년</option><option>2023년</option>
            </select>
            <div class="toggle-tabs">
              <button class="toggle-tab toggle-tab--active" data-type="initial">당초</button>
              <button class="toggle-tab" data-type="revised">추경</button>
            </div>
          </div>
          <div class="budget-toolbar__right">
            <button class="btn-icon">&#128424; 인쇄</button>
            <button class="btn-icon">&#128196; 엑셀</button>
          </div>
        </div>

        <!-- Two-panel layout: Income / Expense -->
        <div class="budget-panels">

          <!-- Income panel -->
          <div class="budget-panel">
            <div class="budget-panel__header">
              <span class="budget-panel__title budget-panel__title--income">수입</span>
            </div>
            <table class="budget-table" id="incomeTable">
              <thead>
                <tr><th style="width:40%">과목</th><th style="width:30%">금액</th><th style="width:30%">산출근거</th></tr>
              </thead>
              <tbody id="incomeBody"></tbody>
            </table>
          </div>

          <!-- Expense panel -->
          <div class="budget-panel">
            <div class="budget-panel__header">
              <span class="budget-panel__title budget-panel__title--expense">지출</span>
            </div>
            <table class="budget-table" id="expenseTable">
              <thead>
                <tr><th style="width:40%">과목</th><th style="width:30%">금액</th><th style="width:30%">산출근거</th></tr>
              </thead>
              <tbody id="expenseBody"></tbody>
            </table>
          </div>
        </div>

        <!-- Balance check -->
        <div class="balance-bar" id="balanceBar">
          <div class="balance-bar__item">
            <span class="balance-bar__label">수입합계</span>
            <span class="balance-bar__value--income" id="incomeTotalDisplay">0</span>
          </div>
          <span class="balance-bar__eq" id="balanceEq">=</span>
          <div class="balance-bar__item">
            <span class="balance-bar__label">지출합계</span>
            <span class="balance-bar__value--expense" id="expenseTotalDisplay">0</span>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>

<script>
var basePath = '../';

// Budget data model
var incomeData = [
  { level: 'cat', name: '보조금수입', children: [
    { level: 'sub', name: '국고보조금', children: [
      { level: 'detail', name: '기본보육료', amount: 18500000, basis: '40명 x 462,500원' },
      { level: 'detail', name: '누리과정보육료', amount: 8200000, basis: '20명 x 410,000원' },
      { level: 'detail', name: '영아보육료', amount: 5600000, basis: '15명 x 373,333원' }
    ]},
    { level: 'sub', name: '시도보조금', children: [
      { level: 'detail', name: '처우개선비', amount: 3600000, basis: '교사4명 x 900,000원' }
    ]}
  ]},
  { level: 'cat', name: '부모부담수입', children: [
    { level: 'sub', name: '보육료수입', children: [
      { level: 'detail', name: '특별활동비', amount: 2400000, basis: '30명 x 80,000원' },
      { level: 'detail', name: '기타필요경비', amount: 1200000, basis: '30명 x 40,000원' }
    ]}
  ]},
  { level: 'cat', name: '기타수입', children: [
    { level: 'sub', name: '잡수입', children: [
      { level: 'detail', name: '이자수입', amount: 30000, basis: '예금이자' }
    ]}
  ]},
  { level: 'cat', name: '이월금', children: [
    { level: 'sub', name: '전년도이월금', children: [
      { level: 'detail', name: '전년도이월금', amount: 3250000, basis: '2024년 잔액이월' }
    ]}
  ]}
];

var expenseData = [
  { level: 'cat', name: '인건비', children: [
    { level: 'sub', name: '원장인건비', children: [
      { level: 'detail', name: '원장급여', amount: 3600000, basis: '300,000원 x 12개월' },
      { level: 'detail', name: '원장수당', amount: 1200000, basis: '100,000원 x 12개월' }
    ]},
    { level: 'sub', name: '보육교사인건비', children: [
      { level: 'detail', name: '교사급여', amount: 14400000, basis: '4명 x 300,000원 x 12개월' },
      { level: 'detail', name: '교사수당', amount: 2400000, basis: '4명 x 50,000원 x 12개월' }
    ]}
  ]},
  { level: 'cat', name: '관리운영비', children: [
    { level: 'sub', name: '시설관리비', children: [
      { level: 'detail', name: '수도광열비', amount: 3600000, basis: '300,000원 x 12개월' },
      { level: 'detail', name: '전기요금', amount: 2400000, basis: '200,000원 x 12개월' },
      { level: 'detail', name: '통신비', amount: 600000, basis: '50,000원 x 12개월' }
    ]},
    { level: 'sub', name: '사무관리비', children: [
      { level: 'detail', name: '소모품비', amount: 1200000, basis: '100,000원 x 12개월' }
    ]}
  ]},
  { level: 'cat', name: '보육활동비', children: [
    { level: 'sub', name: '급식비', children: [
      { level: 'detail', name: '급식비', amount: 7200000, basis: '40명 x 15,000원 x 12개월' },
      { level: 'detail', name: '간식비', amount: 2880000, basis: '40명 x 6,000원 x 12개월' }
    ]},
    { level: 'sub', name: '교재교구비', children: [
      { level: 'detail', name: '교재교구구입비', amount: 1800000, basis: '150,000원 x 12개월' }
    ]},
    { level: 'sub', name: '특별활동비', children: [
      { level: 'detail', name: '특별활동비', amount: 1500000, basis: '특별활동강사료' }
    ]}
  ]}
];

function flattenBudget(data) {
  var rows = [];
  data.forEach(function(cat) {
    var catTotal = 0;
    var subRows = [];
    (cat.children || []).forEach(function(sub) {
      var subTotal = 0;
      var detailRows = [];
      (sub.children || []).forEach(function(d) {
        subTotal += d.amount;
        detailRows.push({ level: 'detail', name: d.name, amount: d.amount, basis: d.basis });
      });
      catTotal += subTotal;
      subRows.push({ level: 'sub', name: sub.name, amount: subTotal });
      subRows = subRows.concat(detailRows);
    });
    rows.push({ level: 'cat', name: cat.name, amount: catTotal });
    rows = rows.concat(subRows);
  });
  return rows;
}

function fmt(n) {
  return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function renderBudgetTable(tbodyId, data) {
  var rows = flattenBudget(data);
  var total = 0;
  var tbody = document.getElementById(tbodyId);
  var html = '';
  rows.forEach(function(r) {
    if (r.level === 'cat') {
      total += r.amount;
      html += '<tr class="row-category"><td>' + r.name + '</td><td class="amount-display">' + fmt(r.amount) + '</td><td></td></tr>';
    } else if (r.level === 'sub') {
      html += '<tr><td class="row-sub">' + r.name + '</td><td class="amount-display">' + fmt(r.amount) + '</td><td></td></tr>';
    } else {
      html += '<tr><td class="row-detail">' + r.name + '</td>' +
        '<td><input class="amount-input" type="text" value="' + fmt(r.amount) + '"></td>' +
        '<td><input class="basis-input" type="text" value="' + (r.basis || '') + '"></td></tr>';
    }
  });
  html += '<tr class="row-total"><td>합계</td><td class="amount-display">' + fmt(total) + '</td><td></td></tr>';
  tbody.innerHTML = html;
  return total;
}

function renderAll() {
  var incomeTotal = renderBudgetTable('incomeBody', incomeData);
  var expenseTotal = renderBudgetTable('expenseBody', expenseData);
  document.getElementById('incomeTotalDisplay').textContent = fmt(incomeTotal);
  document.getElementById('expenseTotalDisplay').textContent = fmt(expenseTotal);
  var eq = document.getElementById('balanceEq');
  if (incomeTotal === expenseTotal) {
    eq.textContent = '=';
    eq.className = 'balance-bar__eq';
  } else {
    eq.textContent = '≠';
    eq.className = 'balance-bar__eq balance-bar__eq--mismatch';
  }
}

document.addEventListener('DOMContentLoaded', function() {
  renderAll();

  // Toggle tabs
  document.querySelectorAll('.toggle-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.toggle-tab').forEach(function(t) { t.classList.remove('toggle-tab--active'); });
      this.classList.add('toggle-tab--active');
    });
  });

  // Sidebar toggle
  document.querySelectorAll('.sidebar-menu-item').forEach(function(item) {
    item.addEventListener('click', function() {
      this.classList.toggle('sidebar-menu-item--open');
      var chevron = this.querySelector('.chevron');
      if (chevron) chevron.classList.toggle('chevron--open');
      var sub = this.nextElementSibling;
      if (sub && sub.classList.contains('sidebar-submenu')) sub.classList.toggle('is-open');
    });
  });
});
</script>
</body>
